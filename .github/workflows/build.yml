name: Build Executables

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false 
        default: false
        type: boolean

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "macos-latest" ]; then
            bun build src/index.ts --compile --outfile dist/xml-to-excel
            echo "OUTPUT_NAME=xml-to-excel-macos" >> $GITHUB_ENV
            echo "BINARY_NAME=xml-to-excel" >> $GITHUB_ENV
          elif [ "${{ matrix.os }}" == "windows-latest" ]; then
            bun build src/index.ts --compile --outfile dist/xml-to-excel.exe
            echo "OUTPUT_NAME=xml-to-excel.exe" >> $GITHUB_ENV
            echo "BINARY_NAME=xml-to-excel.exe" >> $GITHUB_ENV
          else
            bun build src/index.ts --compile --outfile dist/xml-to-excel
            echo "OUTPUT_NAME=xml-to-excel-linux" >> $GITHUB_ENV
            echo "BINARY_NAME=xml-to-excel" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.OUTPUT_NAME }}
          path: dist/${{ env.BINARY_NAME }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display structure of downloaded files
        run: ls -R ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/xml-to-excel-macos/xml-to-excel
            ./artifacts/xml-to-excel.exe/xml-to-excel.exe
            ./artifacts/xml-to-excel-linux/xml-to-excel
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
